schema_version = "1.3"
artifacts = [ "/logs/artifacts",]

[task]
name = "open-mercato/app-OME-FEAT-001-agentic"
description = "Add an app-level bookmarks CRUD module to a freshly scaffolded standalone Open Mercato app, following platform conventions. Same task as app-OME-FEAT-001, but the app is scaffolded WITH the agentic harness (--agents claude-code,codex), so the agent HAS the Open Mercato skills (.claude/ + .ai/skills, e.g. om-module-scaffold) and AGENTS.md/CLAUDE.md guidance available. The pair isolates how much the OM developer harness affects agent success."
keywords = [ "open-mercato", "crud", "module-creation",]
[[task.authors]]
name = "Mateusz Staniaszek"
email = "mateusz.staniaszek1998@gmail.com"

[metadata]
instance_id = "open-mercato__app-OME-FEAT-001-agentic"
difficulty = "easy"
category = "feature-creation"
flow = "standalone-app-external-extension"
tier = 1
keywords = [ "open-mercato", "crud", "module-creation", "typescript", "nextjs", "playwright", "convention-rubric",]

[verifier]
timeout_sec = 1800.0

[verifier.env]
# Judge model id. ANTHROPIC_API_KEY is injected at run time by CI via
# `--verifier-env ANTHROPIC_API_KEY=...`; when absent the judge is skipped and the
# programmatic C-SCOPE-1 pre-check stands.
OM_JUDGE_MODEL = "claude-opus-4-8"

[agent]
timeout_sec = 1800.0

[environment]
network_mode = "public"
build_timeout_sec = 3600.0
os = "linux"
mcp_servers = []

[environment.env]
OM_VERSION = "0.6.6-canary.5643.1.455d21799d"
OM_EVAL_APP_DIR = "/app/eval-app"

[solution.env]
OM_EVAL_APP_DIR = "/app/eval-app"
