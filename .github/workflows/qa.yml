name: Deploy to Dokploy QA (manual)

on:
  workflow_dispatch:
    inputs:
      slot:
        description: "QA slot to deploy to"
        required: true
        type: choice
        options:
          - qa1
      ref:
        description: "Git ref to build (branch/tag/SHA). Default: current branch"
        required: false
        type: string
      image_tag:
        description: "Optional image tag override (default: slot-<sha7>)"
        required: false
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: dokploy-${{ github.event.inputs.slot }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DOCKERFILE: ./docker/preview/Dockerfile
  BUILD_CONTEXT: .

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          SLOT="${{ github.event.inputs.slot }}"
          SHA="${GITHUB_SHA}"
          SHORT_SHA="${SHA:0:7}"

          # Allow overriding the tag
          if [[ -n "${{ github.event.inputs.image_tag }}" ]]; then
            TAG="${{ github.event.inputs.image_tag }}"
          else
            TAG="${SLOT}-${SHORT_SHA}"
          fi

          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          echo "slot=$SLOT" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "image_full=${IMAGE}:${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.BUILD_CONTEXT }}
          file: ${{ env.DOCKERFILE }}
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.meta.outputs.image_full }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resolve Dokploy applicationId
        id: app
        shell: bash
        run: |
          set -euo pipefail
          SLOT="${{ steps.meta.outputs.slot }}"
          if [[ "$SLOT" == "qa1" ]]; then
            APP_ID="${{ vars.DOKPLOY_APP_ID_QA1 }}"
          elif [[ "$SLOT" == "qa2" ]]; then
            APP_ID="${{ vars.DOKPLOY_APP_ID_QA2 }}"
          else
            echo "Unknown slot: $SLOT" >&2
            exit 1
          fi

          if [[ -z "$APP_ID" ]]; then
            echo "Missing Dokploy app id for $SLOT. Set vars.DOKPLOY_APP_ID_QA1 / QA2" >&2
            exit 1
          fi

          echo "application_id=$APP_ID" >> "$GITHUB_OUTPUT"

      - name: Update Docker image in Dokploy (saveDockerProvider)
        shell: bash
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          APP_ID: ${{ steps.app.outputs.application_id }}
          DOCKER_IMAGE: ${{ steps.meta.outputs.image_full }}
        run: |
          set -euo pipefail
          curl -fsS -X POST "${DOKPLOY_URL}/api/application.saveDockerProvider" \
            -H "x-api-key: ${DOKPLOY_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg applicationId "$APP_ID" \
              --arg dockerImage "$DOCKER_IMAGE" \
              '{applicationId: $applicationId, dockerImage: $dockerImage}')"

      - name: Trigger deployment in Dokploy (application.deploy)
        shell: bash
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          APP_ID: ${{ steps.app.outputs.application_id }}
        run: |
          set -euo pipefail
          curl -fsS -X POST "${DOKPLOY_URL}/api/application.deploy" \
            -H "x-api-key: ${DOKPLOY_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg applicationId "$APP_ID" '{applicationId: $applicationId}')"

      - name: Summary
        run: |
          echo "Deployed to slot: ${{ steps.meta.outputs.slot }}"
          echo "Image: ${{ steps.meta.outputs.image_full }}"
          echo "Dokploy appId: ${{ steps.app.outputs.application_id }}"
