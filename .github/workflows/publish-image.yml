name: Publish production image

# Builds the hardened production image (root ./Dockerfile, `runner` stage) and pushes
# it to GHCR so AWS/ECS (and any other Docker host) can pull a pre-built `yarn start`
# image. The QA pipeline (qa-deploy.yml) builds the separate *preview* image; this one
# is the production artifact consumed by deploy/aws.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Extra tag to publish (in addition to prod-<sha>), e.g. v0.6.3"
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="${REGISTRY}/${IMAGE_NAME}"
          SHORT_SHA="${GITHUB_SHA:0:7}"
          TAGS="${IMAGE}:prod-${SHORT_SHA}"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAGS="${TAGS},${IMAGE}:${GITHUB_REF_NAME},${IMAGE}:latest"
          fi
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAGS="${TAGS},${IMAGE}:${{ github.event.inputs.tag }}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "Publishing: ${TAGS}"
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}

      - name: Build and push (runner stage)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: runner
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
