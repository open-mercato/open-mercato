name: Evals (Harbor)

# Triggers a single Harbor job that runs the pinned coding agents (claude-code,
# codex) against the eval dataset on Daytona, then pushes the result records to
# S3 via GitHub OIDC. Phase 4 of .ai/specs/2026-06-07-harbor-eval-framework.md.
#
# One `harbor run --config` runs ALL agents as concurrent trials in a single job
# (JobConfig.agents is a list) — no GitHub Actions matrix needed.
#
# Required repo configuration:
#   Secrets: ANTHROPIC_API_KEY, OPENAI_API_KEY, DAYTONA_API_KEY, EVALS_AWS_ROLE_ARN
#   Vars:    EVALS_S3_BUCKET, EVALS_AWS_REGION
#            (optional pins) CLAUDE_CODE_VERSION, CODEX_VERSION

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      om_version:
        description: "OM release under test (e.g. 0.6.4). Defaults to the latest release tag when empty."
        required: false
        type: string
      agents:
        description: "Which agents to run."
        required: false
        default: both
        type: choice
        options:
          - both
          - claude-code
          - codex
  # TEMPORARY (bring-up only — remove once the pipeline is green, per spec §CI).
  # Scoped to eval changes so normal PRs don't burn Daytona / model credits.
  pull_request:
    paths:
      - "evals/**"
      - ".github/workflows/evals.yml"

permissions:
  id-token: write # OIDC -> AWS STS assume-role
  contents: read

concurrency:
  group: evals-${{ github.ref }}
  cancel-in-progress: true

jobs:
  evals:
    runs-on: ubuntu-latest
    env:
      # OM_VERSION: dispatch input > release tag (strip leading v) > PR sentinel.
      INPUT_OM_VERSION: ${{ github.event.inputs.om_version }}
      RELEASE_TAG: ${{ github.event.release.tag_name }}
      # Which agents to run; only workflow_dispatch can narrow it.
      AGENTS_SELECT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.agents || 'both' }}
      # Secrets / pins consumed when building the Harbor job config.
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      DAYTONA_API_KEY: ${{ secrets.DAYTONA_API_KEY }}
      CLAUDE_CODE_VERSION: ${{ vars.CLAUDE_CODE_VERSION || 'latest' }}
      CODEX_VERSION: ${{ vars.CODEX_VERSION || 'latest' }}
      # Pin the eval harness itself — its version is part of the controlled setup.
      HARBOR_VERSION: ${{ vars.HARBOR_VERSION || '0.13.0' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve OM version
        id: resolve
        run: |
          set -euo pipefail
          if [ -n "${INPUT_OM_VERSION:-}" ]; then
            om_version="${INPUT_OM_VERSION}"
          elif [ -n "${RELEASE_TAG:-}" ]; then
            om_version="${RELEASE_TAG#v}"
          else
            om_version="canary-${GITHUB_SHA::7}"
          fi
          echo "om_version=${om_version}" >> "$GITHUB_OUTPUT"
          echo "Resolved OM_VERSION=${om_version} (agents: ${AGENTS_SELECT})"

      - name: Verify required secrets/vars are present
        env:
          EVALS_S3_BUCKET: ${{ vars.EVALS_S3_BUCKET }}
          EVALS_AWS_REGION: ${{ vars.EVALS_AWS_REGION }}
          EVALS_AWS_ROLE_ARN: ${{ secrets.EVALS_AWS_ROLE_ARN }}
        run: |
          set -euo pipefail
          missing=0
          require() {
            if [ -z "${2}" ]; then
              echo "::error::Missing required configuration: ${1}"
              missing=1
            fi
          }
          # The verifier's LLM judge always uses Anthropic (OM_JUDGE_MODEL in task.toml).
          require "ANTHROPIC_API_KEY" "${ANTHROPIC_API_KEY:-}"
          case "${AGENTS_SELECT}" in
            both)        require "OPENAI_API_KEY" "${OPENAI_API_KEY:-}" ;;
            codex)       require "OPENAI_API_KEY" "${OPENAI_API_KEY:-}" ;;
          esac
          require "DAYTONA_API_KEY" "${DAYTONA_API_KEY:-}"
          require "EVALS_AWS_ROLE_ARN" "${EVALS_AWS_ROLE_ARN}"
          require "EVALS_S3_BUCKET" "${EVALS_S3_BUCKET}"
          require "EVALS_AWS_REGION" "${EVALS_AWS_REGION}"
          if [ "${missing}" -ne 0 ]; then
            echo "::error::Configure the missing secrets/vars in repo settings before running evals."
            exit 1
          fi

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
      - name: Install harbor CLI
        run: |
          set -euo pipefail
          uv tool install "harbor==${HARBOR_VERSION}"
          harbor --version

      - name: Build Harbor job config
        id: config
        env:
          OM_VERSION: ${{ steps.resolve.outputs.om_version }}
          JOBS_DIR: ${{ runner.temp }}/jobs
        run: |
          set -euo pipefail
          # Generate the JobConfig as JSON (YAML superset) so secret values are
          # quoted safely. One job, multiple agents -> concurrent trials.
          python3 - <<'PY'
          import json, os

          om_version = os.environ["OM_VERSION"]
          select = os.environ.get("AGENTS_SELECT", "both")
          jobs_dir = os.environ["JOBS_DIR"]

          agent_specs = {
              "claude-code": {
                  "name": "claude-code",
                  "model_name": "anthropic/claude-opus-4-8",
                  "kwargs": {"version": os.environ.get("CLAUDE_CODE_VERSION", "latest")},
                  "env": {"ANTHROPIC_API_KEY": os.environ["ANTHROPIC_API_KEY"]},
              },
              "codex": {
                  "name": "codex",
                  "model_name": "openai/gpt-5.5",
                  "kwargs": {"version": os.environ.get("CODEX_VERSION", "latest")},
                  "env": {"OPENAI_API_KEY": os.environ.get("OPENAI_API_KEY", "")},
              },
          }
          chosen = ["claude-code", "codex"] if select == "both" else [select]
          agents = [agent_specs[name] for name in chosen]

          config = {
              "job_name": f"evals-{om_version}",
              "jobs_dir": jobs_dir,
              "n_concurrent_trials": max(len(agents), 1),
              "environment": {
                  "type": "daytona",
                  "env": {"OM_VERSION": om_version},
              },
              "verifier": {
                  # LLM judge (OM_JUDGE_MODEL) needs Anthropic regardless of agent.
                  "env": {"ANTHROPIC_API_KEY": os.environ["ANTHROPIC_API_KEY"]},
              },
              "datasets": [{"path": "evals/dataset.toml"}],
              "agents": agents,
          }

          path = os.path.join(os.environ["RUNNER_TEMP"], "job.json")
          with open(path, "w") as fh:
              json.dump(config, fh)

          # Echo a redacted copy for the run log.
          redacted = json.loads(json.dumps(config))
          for agent in redacted["agents"]:
              agent["env"] = {key: "***" for key in agent["env"]}
          redacted["verifier"]["env"] = {key: "***" for key in redacted["verifier"]["env"]}
          print(json.dumps(redacted, indent=2))

          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"path={path}\n")
              out.write(f"jobs_dir={jobs_dir}\n")
          PY

      - name: Configure AWS credentials (OIDC)
        # Done before the run so a misconfigured role fails fast, not after a long eval.
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.EVALS_AWS_ROLE_ARN }}
          aws-region: ${{ vars.EVALS_AWS_REGION }}
          role-session-name: gh-evals-${{ github.run_id }}

      - name: Run Harbor eval job
        run: |
          set -euo pipefail
          harbor run --config "${{ steps.config.outputs.path }}" --yes \
            | tee "${RUNNER_TEMP}/harbor-run.log"

      - name: Upload job results as workflow artifact (debug/fallback)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evals-${{ steps.resolve.outputs.om_version }}
          path: |
            ${{ steps.config.outputs.jobs_dir }}
            ${{ runner.temp }}/harbor-run.log
          if-no-files-found: warn

      - name: Push results to S3
        # Always push: harbor exits 0 on completed-but-failed trials, and on an
        # infra-error exit we still want any partial records in S3 (no-ops if empty).
        if: always()
        env:
          JOBS_DIR: ${{ steps.config.outputs.jobs_dir }}
          OM_VERSION: ${{ steps.resolve.outputs.om_version }}
          EVALS_S3_BUCKET: ${{ vars.EVALS_S3_BUCKET }}
        run: |
          set -euo pipefail
          if [ ! -d "${JOBS_DIR}" ] || [ -z "$(ls -A "${JOBS_DIR}" 2>/dev/null)" ]; then
            echo "::warning::No Harbor job results found at ${JOBS_DIR}; nothing to push."
            exit 0
          fi
          dest="s3://${EVALS_S3_BUCKET}/open-mercato-evals/${OM_VERSION}"
          # Preserve Harbor's job tree (per-agent / per-task / per-trial dirs) under
          # the version prefix. Records and downloaded artifacts both live here.
          aws s3 cp "${JOBS_DIR}" "${dest}/" --recursive
          echo "Pushed Harbor job tree to ${dest}/"
